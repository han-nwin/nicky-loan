<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Premium mortgage lending footer background</title>
  <desc id="desc">Abstract architectural lines, document panels, and soft teal and pink light accents for a mortgage lending website footer.</desc>
  <defs>
