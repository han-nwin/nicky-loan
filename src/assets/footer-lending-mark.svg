      <stop offset="0" stop-color="#171216" />
      <stop offset="0.48" stop-color="#241920" />
      <stop offset="1" stop-color="#0f0d10" />
    </linearGradient>
    <linearGradient id="tealLine" x1="0" x2="1" y1="0" y2="0">
